<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Calcolatrice con funzioni</title>

<style>
body {
    font-family: Arial;
    background: #222;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calcolatrice {
    background: #333;
    padding: 20px;
    border-radius: 10px;
}

#display {
    width: 100%;
    height: 40px;
    font-size: 20px;
    text-align: right;
    margin-bottom: 10px;
}

button {
    width: 60px;
    height: 40px;
    margin: 3px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="calcolatrice">
    <input id="display" disabled><br>

    <!-- Numeri -->
    <button onclick="numero('1')">1</button>
    <button onclick="numero('2')">2</button>
    <button onclick="numero('3')">3</button>
    <button onclick="operatore('+')">+</button><br>

    <button onclick="numero('4')">4</button>
    <button onclick="numero('5')">5</button>
    <button onclick="numero('6')">6</button>
    <button onclick="operatore('-')">-</button><br>

    <button onclick="numero('7')">7</button>
    <button onclick="numero('8')">8</button>
    <button onclick="numero('9')">9</button>
    <button onclick="operatore('*')">*</button><br>

    <button onclick="numero('0')">0</button>
    <button onclick="operatore('/')">/</button>
    <button onclick="calcola()">=</button>
    <button onclick="pulisci()">C</button><br><br>

    <!-- Funzioni Math -->
    <button onclick="potenza()">x²</button>
    <button onclick="radice()">√</button>
    <button onclick="percentuale()">%</button><br>

    <button onclick="seno()">sin</button>
    <button onclick="coseno()">cos</button>
    <button onclick="tangente()">tan</button>
</div>

<script>
let display = document.getElementById("display");

/* VETTORE per numeri e operatore */
let valori = [];
let oper = "";

/* Scrive numeri */
function numero(n) {
    display.value += n;
}

/* Salva numero e operatore */
function operatore(op) {
    valori.push(parseFloat(display.value));
    oper = op;
    display.value = "";
}

/* Calcolo base */
function calcola() {
    valori.push(parseFloat(display.value));

    let risultato = 0;

    if (oper === "+") risultato = valori[0] + valori[1];
    if (oper === "-") risultato = valori[0] - valori[1];
    if (oper === "*") risultato = valori[0] * valori[1];
    if (oper === "/") risultato = valori[0] / valori[1];

    display.value = risultato;
    valori = [];
}

/* FUNZIONI MATH */
function potenza() {
    display.value = Math.pow(parseFloat(display.value), 2);
}

function radice() {
    display.value = Math.sqrt(parseFloat(display.value));
}

function percentuale() {
    display.value = parseFloat(display.value) / 100;
}

function seno() {
    display.value = Math.sin(parseFloat(display.value));
}

function coseno() {
    display.value = Math.cos(parseFloat(display.value));
}

function tangente() {
    display.value = Math.tan(parseFloat(display.value));
}

/* PULISCI */
function pulisci() {
    display.value = "";
    valori = [];
}
</script>

</body>
</html>
