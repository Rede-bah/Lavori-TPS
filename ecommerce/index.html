<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Piattforma Scolare</title>
<style>
  body { font-family: Arial, sans-serif; background:#f9f9f9; padding:20px; }
  h1 { text-align:center; }
  .menu { text-align:center; margin-bottom:20px; }
  button { margin: 5px; padding:10px 15px; }
  .sezione { display: none; }
  .attiva { display: block; }
  #catalogo { display: flex; flex-wrap: wrap; justify-content: center; }
  .prodotto { background-color: #fff; border: 1px solid #ccc; border-radius: 8px; margin: 10px; padding:10px; width: 200px; text-align: center; }
  .prodotto img { max-width: 100%; height: auto; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border:1px solid #ccc; padding:8px; text-align:center; }
</style>
</head>
<body>

<h1>Ecommerce</h1>


<div class="menu">
  <button onclick="mostraSezione('config')">Configura csv</button>
  <button onclick="mostraSezione('catalogo')">Catalogo</button>
  <button onclick="mostraSezione('carrello')">Carrello</button>
</div>


<div id="sezione-config" class="sezione">
  <h2>Carica il file CSV</h2>
  <input type="file" id="inputCsv" accept=".csv" />
  <button onclick="caricaCsv()">Carica csv</button>
  <p id="status"></p>
</div>


<div id="sezione-catalogo" class="sezione">
  <h2>Catalogo Prodotti</h2>
  <div id="catalogo"></div>
</div>

<div id="sezione-carrello" class="sezione">
  <h2> Carrello</h2>
  <table id="tabella-carrello">
    <tr>
      <th>Immagine</th>
      <th>Marca e Modello</th>
      <th>Descrizione</th>
      <th>Prezzo</th>
    </tr>
  </table>
  <button onclick="finalizzaAcquisto()">Completa Acquisto</button>
  <button onclick="svuotaCarrello()">Svuota Carrello</button>
</div>

<script>
  let catalogoProdotti = [];
  let carrello = [];

  function mostraSezione(nome) {
    document.querySelectorAll('.sezione').forEach(s => s.classList.remove('attiva'));
    document.getElementById('sezione-' + nome).classList.add('attiva');

    if(nome==='catalogo') mostraCatalogo();
    if(nome==='carrello') mostraCarrello();
  }

  function caricaCsv() {
    const input = document.getElementById('inputCsv');
    const file = input.files[0];
    if(!file) {
      alert('Seleziona un file csv');
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
      const csvData = e.target.result;
      parseCsv(csvData);
      document.getElementById('status').innerText='csv caricato Puoi vedere il catalogo.';
    };
    reader.readAsText(file);
  }

  function parseCsv(csvData) {
    catalogoProdotti = [];
    const righe = csvData.trim().split('\n');
    for(let i=1; i<righe.length; i++) {
      const c = righe[i].split(';');
      if(c.length >= 5) {
        const [marca, modello, descrizione, immagine, prezzo] = c;
        catalogoProdotti.push({marca, modello, descrizione, immagine, prezzo});
      }
    }
  }


  function mostraCatalogo() {
    const container = document.getElementById('catalogo');
    container.innerHTML = '';
    catalogoProdotti.forEach(p => {
      const div = document.createElement('div');
      div.className='prodotto';
      div.innerHTML=`
        <img src="${p.immagine}" alt="${p.marca} ${p.modello}">
        <h3>${p.marca} ${p.modello}</h3>
        <p>${p.descrizione}</p>
        <p>Prezzo: € ${p.prezzo}</p>
        <button onclick='aggiungiAlCarrello(${JSON.stringify(p)})'>Aggiungi al Carrello</button>
      `;
      container.appendChild(div);
    });
  }

  function aggiungiAlCarrello(prodotto) {
    carrello.push(prodotto);
    alert('Prodotto aggiunto');
  }


  function mostraCarrello() {
    const table = document.getElementById('tabella-carrello');
    table.innerHTML = `
      <tr>
        <th>Immagine</th>
        <th>Marca e Modello</th>
        <th>Descrizione</th>
        <th>Prezzo</th>
      </tr>`;
    carrello.forEach(p => {
      const tr = document.createElement('tr');
      tr.innerHTML=`
        <td><img src="${p.immagine}" width="50"></td>
        <td>${p.marca} ${p.modello}</td>
        <td>${p.descrizione}</td>
        <td>€ ${p.prezzo}</td>
      `;
      table.appendChild(tr);
    });
  }


  function finalizzaAcquisto() {
    if(carrello.length===0) {
      alert('Il carrello è vuoto');
      return;
    }
    alert('Acquisto completato ');
    carrello = [];
    mostraCarrello();
  }

 
  function svuotaCarrello() {
    carrello = [];
    mostraCarrello();
  }


  mostraSezione('config');
</script>

</body>
</html>
